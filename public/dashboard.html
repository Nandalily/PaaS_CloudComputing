<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>🎉 Welcome to Dashboard</h1>
  <p>You are logged in!</p>

  <button onclick="logout()">Logout</button>
</div>

<script>
function logout() {
  localStorage.removeItem("token");
  window.location.href = "/";
}
</script>

</body>
</html>
